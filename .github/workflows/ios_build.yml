name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. УДАЛЯЕМ СТАРЫЙ PODFILE СРАЗУ ЖЕ!
          # Это не даст Flutter'у упасть при первичной настройке
          rm -f ios/Podfile
          rm -f ios/Podfile.lock
          
          # 2. Инициализируем проект и скачиваем пакеты
          flutter create . --platforms=ios
          flutter pub get
          
          # 3. Генерируем служебные файлы (включая тот самый generated_podhelpers.rb)
          # Так как старого Podfile больше нет, Flutter создаст стандартный и пройдет этот шаг без ошибок!
          flutter build ios --config-only --no-codesign
          
          # 4. ТЕПЕРЬ, когда файл generated_podhelpers.rb 100% существует, создаем наш Podfile с iOS 15.0
          cat << EOF > ios/Podfile
          platform :ios, '15.0'
          
          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'generated_podhelpers.rb')
          
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
          
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Форсируем 15.0
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          
          # 5. Прописываем версию 15.0 в настройках самого проекта Xcode
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          # 6. Финально устанавливаем поды
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Release
        run: |
          # --no-pub не дает Flutter перезаписать наш Podfile
          flutter build ios --release --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa