name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate iOS files (Expect failure)
        # Позволяем команде упасть (|| true означает "если будет ошибка - игнорируй и иди дальше").
        # К моменту падения нужный нам Podfile уже будет создан!
        run: flutter build ios --config-only || true

      - name: Update Podfile to iOS 15
        run: |
          cd ios
          # Теперь, когда Podfile точно существует, принудительно меняем версию на 15.0
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          cd ..

      - name: Build iOS
        # Запускаем чистовую сборку. Теперь Podfile правильный, и Firebase установится!
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa