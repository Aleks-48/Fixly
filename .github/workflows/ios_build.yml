name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. Создаем структуру iOS-проекта
          flutter create . --platforms=ios
          
          # 2. Генерируем конфигурацию Flutter (это создаст папку ios/Flutter)
          # Если команда упадет из-за Podfile — не страшно, мы идем дальше (|| true)
          flutter build ios --config-only --no-codesign || true
          
          # 3. Теперь принудительно перезаписываем Podfile на версию 15.0
          # Мы делаем это ПОСЛЕ того, как Flutter создал свои служебные файлы
          cat << EOF > ios/Podfile
          platform :ios, '15.0'

          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'generated_podhelpers.rb')

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Форсируем 15.0 для всех плагинов (включая Firebase)
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF

          # 4. Правим версию iOS в самом проекте Xcode (внутри pbxproj)
          # Это предотвратит ошибку несоответствия Runner и Pods
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +

          # 5. Очищаем старые артефакты CocoaPods, если они есть
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

          # 6. Устанавливаем поды вручную с обновлением репозитория
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        run: |
          # Собираем билд. Флаг --no-pub критичен, чтобы Flutter не пересоздал файлы заново.
          flutter build ios --release --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Находим .app файл
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa