name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare iOS and Patch
        run: |
          # 1. Загружаем зависимости Flutter
          flutter pub get
          
          # 2. ИСПРАВЛЕНИЕ ОШИБКИ: Создаем папку и "файл-обманку"
          # Это нужно, чтобы Ruby (Podfile) нашел файл и функции, даже если они пока пустые
          mkdir -p ios/Flutter
          echo "def flutter_install_all_ios_pods(path); end" > ios/Flutter/generated_podhelpers.rb
          echo "def flutter_additional_ios_build_settings(target); end" >> ios/Flutter/generated_podhelpers.rb
          
          # 3. Генерируем реальные файлы конфигурации
          # Flutter увидит нашу заглушку и ПЕРЕЗАПИШЕТ её правильным рабочим кодом
          flutter build ios --config-only --no-codesign
          
          # 4. Патчим версию iOS до 15.0 везде, где это нужно
          python3 - << 'EOF'
          import re
          import os

          # Исправляем проект Xcode
          pbx_path = 'ios/Runner.xcodeproj/project.pbxproj'
          if os.path.exists(pbx_path):
              with open(pbx_path, 'r') as f: pbx = f.read()
              pbx = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;', pbx)
              with open(pbx_path, 'w') as f: f.write(pbx)

          # Исправляем Podfile (ставим платформу 15.0)
          pod_path = 'ios/Podfile'
          if os.path.exists(pod_path):
              with open(pod_path, 'r') as f: pod = f.read()
              pod = re.sub(r'^#? ?platform :ios.*', "platform :ios, '15.0'", pod, flags=re.MULTILINE)
              with open(pod_path, 'w') as f: f.write(pod)
          EOF

          # 5. Устанавливаем поды (теперь все файлы на месте)
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Release
        # Теперь Flutter сам вызовет pod install, и у него будут все нужные файлы и правильная версия!
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa