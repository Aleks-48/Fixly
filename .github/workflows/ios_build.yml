name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch iOS Versions (Python)
        run: |
          # Используем Python для аккуратной замены текста в файлах, не ломая структуру Flutter
          cat << 'EOF' > patch_ios.py
          import re
          import os

          # 1. Меняем версию в настройках Xcode
          pbx_path = 'ios/Runner.xcodeproj/project.pbxproj'
          if os.path.exists(pbx_path):
              with open(pbx_path, 'r') as f: pbx = f.read()
              pbx = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;', pbx)
              with open(pbx_path, 'w') as f: f.write(pbx)

          # 2. Меняем версию в существующем Podfile
          pod_path = 'ios/Podfile'
          if os.path.exists(pod_path):
              with open(pod_path, 'r') as f: pod = f.read()
              
              # Раскомментируем и ставим platform :ios, '15.0'
              pod = re.sub(r'^#? ?platform :ios.*', "platform :ios, '15.0'", pod, flags=re.MULTILINE)
              
              # Форсируем 15.0 для всех зависимостей (Firebase)
              hook_old = 'flutter_additional_ios_build_settings(target)'
              hook_new = hook_old + """
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                end"""
              if "IPHONEOS_DEPLOYMENT_TARGET" not in pod:
                  pod = pod.replace(hook_old, hook_new)
              
              with open(pod_path, 'w') as f: f.write(pod)
          print("Патч на iOS 15.0 успешно применен!")
          EOF
          python3 patch_ios.py

      - name: Build iOS Release
        # Теперь Flutter сам вызовет pod install, и у него будут все нужные файлы и правильная версия!
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa