name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. Создаем структуру iOS (если её нет)
          flutter create . --platforms=ios
          
          # 2. Генерируем служебные файлы Flutter (тот самый generated_podhelpers.rb)
          # Делаем это ДО правки Podfile
          flutter build ios --config-only --no-codesign
          
          # 3. Правим версию iOS в самом проекте Xcode (внутри pbxproj)
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          # 4. Правим версию iOS в Podfile (меняем существующую строку, а не перезаписываем файл)
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/g" ios/Podfile
          
          # 5. Добавляем post_install хук в конец Podfile для гарантии 15.0 для всех подов
          echo "
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end" >> ios/Podfile

      - name: Build iOS
        run: |
          # ВАЖНО: Мы НЕ запускаем flutter clean здесь, чтобы не удалить пропатченные файлы
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa