name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate iOS Infrastructure
        # Мы создаем папку ios, но ЗАПРЕЩАЕМ Flutter запускать pod install автоматически
        run: |
          flutter create . --platforms=ios
          flutter pub get

      - name: Patch Podfile for iOS 15
        run: |
          cd ios
          # Если файла нет (мало ли), создадим минимальный дефолтный
          if [ ! -f Podfile ]; then
            flutter build ios --config-only --no-pub || true
          fi
          # Принудительно ставим платформу 15.0 во всех возможных местах
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          # Добавляем фикс для всех подов внутри Podfile
          echo "
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end" >> Podfile
          cd ..

      - name: Build iOS
        # Теперь запускаем сборку, она сама сделает pod install с нашими правками
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa