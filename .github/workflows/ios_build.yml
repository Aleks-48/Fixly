name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate iOS files safely
        # Секретная команда: она воссоздает системные файлы Apple и Podfile,
        # но при этом НЕ запускает pod install, поэтому не падает из-за Firebase!
        run: flutter create . --platforms=ios

      - name: Patch Podfile for iOS 15
        run: |
          cd ios
          # Теперь спокойно ищем файл и меняем версии на 15.0
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '11.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/# platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          
          # Заставляем абсолютно все плагины (включая Firebase) использовать iOS 15.0
          echo "
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end" >> Podfile
          cd ..

      - name: Build iOS
        # И только теперь, когда Podfile ИДЕАЛЬНЫЙ, запускаем настоящую сборку
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa