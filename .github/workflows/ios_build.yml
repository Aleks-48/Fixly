name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. Чистая инициализация проекта
          flutter create . --platforms=ios
          flutter pub get
          
          # 2. Удаляем Podfile, если он есть, чтобы Flutter создал "чистый" стандартный вариант
          rm -f ios/Podfile
          
          # 3. Запускаем генерацию конфигов со СТАНДАРТНЫМ Podfile
          # Это создаст папку ios/Flutter и файл generated_podhelpers.rb без ошибок
          flutter build ios --config-only --no-codesign
          
          # 4. ТЕПЕРЬ, когда все хелперы созданы, записываем наш кастомный Podfile (iOS 15.0)
          cat << EOF > ios/Podfile
          platform :ios, '15.0'
          
          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'generated_podhelpers.rb')
          
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
          
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Принудительно ставим 15.0 для всех зависимостей (Firebase и др.)
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          
          # 5. Прописываем версию 15.0 в самом проекте Xcode (.pbxproj)
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          # 6. Устанавливаем поды вручную, используя уже наш новый Podfile
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..
      - name: Build iOS Release
        run: |
          # --no-pub не дает Flutter перезаписать наш Podfile
          flutter build ios --release --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa