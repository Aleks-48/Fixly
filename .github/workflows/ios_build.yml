name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch and Build iOS
        run: |
          # 1. Заставляем Flutter создать папку ios и системные файлы (даже если будет ошибка в конце, файлы появятся)
          flutter build ios --config-only --no-codesign || true
          
          # 2. Используем Ruby для «хирургического» исправления Podfile
          # Это поменяет версию на 15.0 и добавит настройки для всех плагинов (Firebase и др.)
          ruby -e "
            path = 'ios/Podfile'
            if File.exist?(path)
              content = File.read(path)
              # Меняем платформу на 15.0
              content.gsub!(/^#?\s*platform :ios, .*/, \"platform :ios, '15.0'\")
              # Вставляем настройку версии во внутренний цикл Flutter
              if !content.include?('IPHONEOS_DEPLOYMENT_TARGET')
                content.gsub!(/flutter_additional_ios_build_settings\(target\)/) do |match|
                  \"#{match}\n      target.build_configurations.each do |config|\n        config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n      end\"
                end
              end
              File.write(path, content)
              puts 'Podfile успешно исправлен под iOS 15.0'
            else
              puts 'Ошибка: Podfile не найден!'
              exit 1
            end
          "
          
          # 3. Теперь запускаем чистую сборку
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa