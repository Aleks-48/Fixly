name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Project
        run: |
          flutter pub get
          # Генерируем все служебные файлы Flutter (включая generated_podhelpers.rb)
          # без запуска CocoaPods
          flutter build ios --config-only --no-codesign

      - name: Patch iOS Version and Pods
        run: |
          # 1. Форсируем iOS 15.0 в проекте Xcode
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          # 2. Правим Podfile: устанавливаем платформу и добавляем пост-инсталл хук
          python3 - << 'EOF'
          import os, re
          path = 'ios/Podfile'
          if os.path.exists(path):
              with open(path, 'r') as f: content = f.read()
              
              # Устанавливаем платформу
              content = re.sub(r'^#? ?platform :ios.*', "platform :ios, '15.0'", content, flags=re.MULTILINE)
              
              # Добавляем принудительную версию для всех подов
              if "config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'" not in content:
                  hook = "flutter_additional_ios_build_settings(target)"
                  patch = hook + "\n      target.build_configurations.each do |config|\n        config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n      end"
                  content = content.replace(hook, patch)
                  
              with open(path, 'w') as f: f.write(content)
          EOF

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Release
        run: flutter build ios --release --no-codesign --no-bundle

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa