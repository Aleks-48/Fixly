name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. Создаем структуру iOS-проекта (флаг --no-pub предотвращает запуск подтягивания плагинов на этом этапе)
          flutter create . --platforms=ios --no-pub
          
          # 2. Создаем папку Flutter вручную (это предотвратит ошибки путей в Podfile)
          mkdir -p ios/Flutter
          
          # 3. ПРИНУДИТЕЛЬНО создаем правильный Podfile с версией 15.0 ДО того, как Flutter его тронет
          cat << EOF > ios/Podfile
          platform :ios, '15.0'

          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'generated_podhelpers.rb')

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Гарантируем 15.0 для Firebase и других плагинов
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF

          # 4. Генерируем служебные файлы Flutter (теперь они подхватят наш Podfile)
          # Используем флаг --no-codesign, чтобы не требовать сертификаты
          flutter build ios --config-only --no-codesign

          # 5. Правим версию iOS в конфигурации самого проекта Xcode (Runner.xcodeproj)
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +

          # 6. Устанавливаем поды вручную
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        run: |
          # Собираем приложение окончательно
          flutter build ios --release --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=\$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "\$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa