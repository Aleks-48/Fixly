name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Prepare iOS and Patch
        run: |
          # 1. Создаем структуру iOS, если она отсутствует
          flutter create . --platforms=ios
          
          # 2. Генерируем служебные файлы (создает папку ios/Flutter и файлы настроек)
          # Используем --config-only, чтобы подготовить почву без запуска полной сборки
          flutter build ios --config-only --no-codesign
          
          # 3. Принудительно перезаписываем Podfile с версией 15.0
          # Это гарантирует, что CocoaPods увидит нужную версию платформы
          cat << EOF > ios/Podfile
          platform :ios, '15.0'

          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'generated_podhelpers.rb')

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Форсируем iOS 15.0 для всех зависимых подов (нужно для Firebase)
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF

          # 4. Правим версию в самом проекте Xcode (в файле pbxproj)
          # Это критично, чтобы Xcode не пытался собрать Runner под iOS 13
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +

      - name: Build iOS
        run: |
          # Собираем приложение. Теперь конфигурация уже верная, и pod install пройдет успешно.
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa