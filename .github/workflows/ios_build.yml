name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare iOS and Patch
        run: |
          # 1. Загружаем пакеты
          flutter pub get
          
          # 2. УСТРАНЯЕМ ОШИБКУ "cannot load such file"
          # Создаем папку и файл-заглушку с пустыми функциями, чтобы Podfile не "падал" при чтении
          mkdir -p ios/Flutter
          echo "def flutter_install_all_ios_pods(path); end" > ios/Flutter/generated_podhelpers.rb
          echo "def flutter_additional_ios_build_settings(target); end" >> ios/Flutter/generated_podhelpers.rb
          
          # 3. Теперь запускаем конфигурацию Flutter. 
          # Теперь он увидит, что файл есть, и просто ПЕРЕЗАПИШЕТ его правильным содержимым.
          flutter build ios --config-only --no-codesign
          
          # 4. Патчим версию iOS на 15.0 (чтобы не было ошибок с Firebase/другими модами)
          python3 - << 'EOF'
          import re
          import os

          def patch_file(path, pattern, replacement):
              if os.path.exists(path):
                  with open(path, 'r') as f: content = f.read()
                  new_content = re.sub(pattern, replacement, content, flags=re.MULTILINE)
                  with open(path, 'w') as f: f.write(new_content)

          # Исправляем проект Xcode
          patch_file('ios/Runner.xcodeproj/project.pbxproj', 
                     r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;', 
                     'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')

          # Исправляем Podfile
          patch_file('ios/Podfile', 
                     r'^#? ?platform :ios.*', 
                     "platform :ios, '15.0'")
          EOF

          # 5. Принудительно устанавливаем поды
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Release
        # Теперь Flutter сам вызовет pod install, и у него будут все нужные файлы и правильная версия!
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa