name: iOS Build

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare iOS and Patch
        run: |
          # 1. Сначала скачиваем зависимости Flutter
          flutter pub get
          
          # 2. РЕШАЕМ КОСЯК: Создаем папку и файл-заглушку вручную
          # Это нужно, чтобы CocoaPods не падал при чтении Podfile
          mkdir -p ios/Flutter
          touch ios/Flutter/generated_podhelpers.rb
          
          # 3. Принудительно генерируем правильные файлы конфигурации Flutter
          # Эта команда перезапишет нашу заглушку реальным содержимым
          flutter build ios --config-only --no-codesign
          
          # 4. Исправляем версию iOS до 15.0 в проекте и Podfile
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          sed -i '' "s/^# *platform :ios.*/platform :ios, '15.0'/" ios/Podfile
          sed -i '' "s/^platform :ios.*/platform :ios, '15.0'/" ios/Podfile

      - name: Build iOS Release
        # Теперь Flutter сам вызовет pod install, и у него будут все нужные файлы и правильная версия!
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: fixly-iphone-app
          path: app.ipa